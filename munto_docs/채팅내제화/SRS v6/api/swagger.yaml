    get:
      tags: [Admin]
      summary: 메시지 검색 (관리자) [V2+]
      description: |
        조건에 맞는 메시지를 검색합니다. (SRS 7.8.7 참조)
        
        **검색 조건:**
        - `senderId`: 발신자 사용자 ID
        - `roomId`: 채팅방 ID
        - `keyword`: 메시지 내용 키워드 (한글 부분 일치 지원, pg_bigm)
        - `sentAfter` / `sentBefore`: 기간 (최대 90일 범위)
        - `hasExternalContact`: 전화번호/SNS ID 등 외부 연락처 패턴 포함 여부
        
        **참고:**
        - 검색 수행 시 감사 로그 자동 기록
        - 결과는 JSON 형식으로 다운로드 가능 (`Accept: application/json`)
        
        **권한:** 백오피스 관리자만 가능
      security:
        - AdminAuth: []
      parameters:
        - name: senderId
          in: query
          schema:
            type: integer
          description: 발신자 사용자 ID
        - name: roomId
          in: query
          schema:
            type: integer
          description: 채팅방 ID
        - name: keyword
          in: query
          schema:
            type: string
          description: 메시지 내용 키워드 (한글 부분 일치)
        - name: sentAfter
          in: query
          schema:
            type: integer
            format: int64
          description: 검색 시작 시간 (Unix time ms)
        - name: sentBefore
          in: query
          schema:
            type: integer
            format: int64
          description: 검색 종료 시간 (Unix time ms, sentAfter로부터 최대 90일)
        - name: hasExternalContact
          in: query
          schema:
            type: boolean
          description: 전화번호/SNS ID 등 외부 연락처 패턴 포함 여부 필터
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - name: count
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: 한 페이지당 항목 수 (기본 50건)
      responses:
        '200':
          description: 메시지 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # /admin/reports 제거 — 신고 접수·조회·처리는 각 앱 백오피스(데이팅 safety / 문토 report)에서 수행 (SRS 7.6.6)
  /admin/profanity:
    get:
      tags: [Admin]
      summary: 금칙어 목록 조회 [V2+]
      description: |
        금칙어 목록을 조회합니다. (SRS 7.8.5 참조)
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 금칙어 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfanityListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Admin]
      summary: 금칙어 추가 [V2+]
      description: |
        금칙어를 추가합니다. (SRS 7.8.5 참조)
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfanityRequest'
      responses:
        '201':
          description: 금칙어 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfanityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/profanity/{profanityId}:
    patch:
      tags: [Admin]
      summary: 금칙어 수정 [V2+]
      description: |
        금칙어를 수정합니다. (SRS 7.8.5 참조)
      security:
        - AdminAuth: []
      parameters:
        - name: profanityId
          in: path
          required: true
          schema:
            type: integer
          description: 금칙어 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfanityRequest'
      responses:
        '200':
          description: 금칙어 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfanityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Admin]
      summary: 금칙어 삭제 [V2+]
      description: |
        금칙어를 삭제합니다. (SRS 7.8.5 참조)
      security:
        - AdminAuth: []
      parameters:
        - name: profanityId
          in: path
          required: true
          schema:
            type: integer
          description: 금칙어 ID
      responses:
        '200':
          description: 금칙어 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

# ================================
# Components
# ================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: munto-backend에서 발급받은 통합 JWT 토큰 (`userId`=muntoUserId 커스텀 클레임, 표준 sub 아님 — WEBB-1196)
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        관리자(백오피스) 전용. JWT에 `UserGrade.ADMIN` 권한이 있어야 한다(SRS 7.8.1).
        `/admin/*` 엔드포인트는 이 스킴을 사용하며, 권한 미달 시 403을 반환한다.

  parameters:
    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
      description: 채팅방 ID

    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 메시지 ID (messages.id = BIGSERIAL). JSON number로 전송 — 실 ID가 JS 안전정수(2^53) 이하라 안전, 근접 시 string 전환(SRS 7.3.5)

    CursorAfter:
      name: after
      in: query
      schema:
        type: integer
        format: int64
      description: 커서 페이지네이션 — 이 메시지 `id` **이후(더 큰 id, 더 최신)** 부터 반환. 커서는 `messages.id`(BIGINT) 순수 id 기반(불투명 토큰 아님)

    CursorBefore:
      name: before
      in: query
      schema:
        type: integer
        format: int64
      description: 커서 페이지네이션 — 이 메시지 `id` **이전(더 작은 id, 더 과거)** 부터 반환. 커서는 `messages.id`(BIGINT) 순수 id 기반

    Count:
      name: count
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: 한 페이지당 항목 수 (기본 50건)

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: 서버 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ================================
    # 공통 스키마
    # ================================
    SuccessResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "요청이 성공적으로 처리되었습니다."

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "인증이 필요합니다."

    PaginationMeta:
      type: object
      properties:
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
        hasPrevious:
          type: boolean
          description: 이전 페이지 존재 여부
        nextCursor:
          type: string
          nullable: true
          description: 다음 페이지 커서
        previousCursor:
          type: string
          nullable: true
          description: 이전 페이지 커서

    # ================================
    # 사용자 스키마
    # ================================
    UserSummary:
      type: object
      required: [userId, nickname]
      properties:
        userId:
          type: integer
          example: 123
        nickname:
          type: string
          example: "문토유저"
        profilePhotoUrl:
          type: string
          nullable: true
          example: "https://s3.../profile.jpg"

    Participant:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          required: [role, joinedAt]
          properties:
            role:
              type: string
              enum: [HOST, MANAGER, MEMBER, ADMINISTRATOR]
              description: 참여자 역할
            joinedAt:
              type: integer
              format: int64
              description: 참여 시간 (Unix time ms)
              example: 1704067200000

    # ================================
    # 채팅방 스키마
    # ================================
    ChatRoomSummary:
      type: object
      required: [roomId, roomType, name, unreadCount]
      properties:
        roomId:
          type: integer
          example: 1
        roomType:
          $ref: '#/components/schemas/ChatRoomType'
        name:
          type: string
          example: "1월 북클럽 모임"
        thumbnailUrl:
          type: string
          nullable: true
        unreadCount:
          type: integer
          example: 3
        lastMessage:
          $ref: '#/components/schemas/LastMessage'
        # 그룹 채팅방 (모임)
        moimType:
          allOf:
            - $ref: '#/components/schemas/MoimType'
          nullable: true
        moimId:
          type: integer
          nullable: true
        # DM 채팅방
        otherUser:
          $ref: '#/components/schemas/UserSummary'
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (Unix time ms)

    LastMessage:
      type: object
      nullable: true
      properties:
        content:
          type: string
          example: "안녕하세요!"
          description: 메시지 내용 (이미지면 "사진")
        type:
          $ref: '#/components/schemas/MessageType'   # 그룹/특수 메시지가 마지막 메시지일 수 있음
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        sender:
          $ref: '#/components/schemas/UserSummary'

    ChatRoomListResponse:
      type: object
      required: [rooms, meta]
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/ChatRoomSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ChatRoomDetailResponse:
      type: object
      required: [roomId, roomType, name, participantCount, createdAt]
      properties:
        roomId:
          type: integer
        roomType:
          $ref: '#/components/schemas/ChatRoomType'
        name:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: integer
          format: int64
          description: 생성 시간 (Unix time ms)
        lastMessage:
          $ref: '#/components/schemas/LastMessage'
        # 그룹 채팅방 (모임)
        moimType:
          allOf:
            - $ref: '#/components/schemas/MoimType'
          nullable: true
        moimId:
          type: integer
          nullable: true
        # DM 채팅방
        otherUser:
          $ref: '#/components/schemas/UserSummary'
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        activatedAt:
          type: integer
          format: int64
          nullable: true
          description: 활성화 시간 (Unix time ms)
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (Unix time ms)
        remainingDays:
          type: integer
          nullable: true
          description: 만료까지 남은 일수

    ParticipantListResponse:
      type: object
      required: [participants]
      properties:
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'

    # ================================
    # 메시지 스키마
    # ================================
    MessageType:
      type: string
      enum: [TEXT, IMAGE, SYSTEM, CHALLENGE_CHECKIN, FEED, POLL]
      description: 메시지 타입 (전 메시지 스키마 공통 — Message/LastMessage/AdminMessage가 $ref로 공유)

    ChatRoomType:
      type: string
      enum: [GROUP, DM, DATING_DM]
      description: 채팅방 타입 (공통 — $ref로 공유)

    MoimType:
      type: string
      enum: [SOCIALING, CLUB, CHALLENGE]
      description: 그룹 채팅방 모임 종류 (GROUP 전용, 공통 — $ref로 공유). nullable이 필요한 곳은 allOf+nullable로 래핑

    Message:
      type: object
      required: [id, roomId, type, content, sender, sentAt, isAnnouncement, isBlinded]
      properties:
        id:
          type: integer
          format: int64    # messages.id = BIGSERIAL (BIGINT)
        roomId:
          type: integer
        type:
          $ref: '#/components/schemas/MessageType'
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
          description: |
            메시지 내용
            - TEXT: 문자열
            - IMAGE: URL 배열
            - SYSTEM: 객체
            - CHALLENGE_CHECKIN/FEED/POLL: 객체
        sender:
          $ref: '#/components/schemas/UserSummary'
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        isAnnouncement:
          type: boolean
        isBlinded:
          type: boolean
        unreadCount:
          type: integer
          description: 이 메시지를 안 읽은 사람 수

    MessageListResponse:
      type: object
      required: [messages, meta]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 이미지 스키마
    # ================================
    ImageItem:
      type: object
      required: [imageUrl, messageId, sentAt, sender]
      properties:
        imageUrl:
          type: string
          description: 이미지 URL
        thumbnailUrl:
          type: string
          description: 썸네일 URL
        messageId:
          type: integer
          description: 원본 메시지 ID
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        sender:
          $ref: '#/components/schemas/UserSummary'

    ImageListResponse:
      type: object
      required: [images, meta]
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 공지사항 스키마
    # ================================
    Announcement:
      type: object
      required: [messageId, content, type, setBy, setAt]
      properties:
        messageId:
          type: integer
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        type:
          type: string
          enum: [TEXT, IMAGE]
        setBy:
          $ref: '#/components/schemas/UserSummary'
        setAt:
          type: integer
          format: int64
          description: 공지 설정 시간 (Unix time ms)

    AnnouncementListResponse:
      type: object
      required: [announcements, meta]
      properties:
        announcements:
          type: array
          items:
            $ref: '#/components/schemas/Announcement'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 알림 설정 스키마
    # ================================
    GlobalNotificationSettingResponse:
      type: object
      required: [chatNotificationsEnabled]
      properties:
        chatNotificationsEnabled:
          type: boolean
          description: 채팅 알림 켜기/끄기 (전역, 모든 채팅방 공통). 전체 알림(앱 마스터)은 채팅 서버가 관리하지 않음

    UpdateGlobalNotificationRequest:
      type: object
      properties:
        chatNotificationsEnabled:
          type: boolean
          description: 채팅 알림 켜기/끄기 (전역)

    RoomNotificationSettingResponse:
      type: object
      required: [roomId, enabled]
      properties:
        roomId:
          type: integer
        enabled:
          type: boolean
          description: 알림 켜기/끄기

    UpdateRoomNotificationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: 알림 켜기/끄기

    # ================================
    # 업로드 스키마
    # ================================
    PresignedUrlRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: object
            required: [filename, contentType]
            properties:
              filename:
                type: string
                example: "image1.jpg"
              contentType:
                type: string
                enum: [image/jpeg, image/png, image/gif, image/webp, image/heic]
          minItems: 1
          maxItems: 10
          description: 업로드할 파일 정보 (최대 10개)

    PresignedUrlResponse:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: object
            required: [uploadUrl, imageUrl]
            properties:
              uploadUrl:
                type: string
                description: S3 업로드용 Presigned URL
              imageUrl:
                type: string
                description: 업로드 완료 후 접근 가능한 이미지 URL

    # ================================
    # 관리자 스키마
    # ================================
    # ================================
    # 금칙어 스키마
    # ================================
    Profanity:
      type: object
      required: [id, word, matchType, caseSensitive]
      properties:
        id:
          type: integer
        word:
          type: string
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
          description: 일치 타입 (부분/완전)
        caseSensitive:
          type: boolean
          description: 대소문자 구분

    ProfanityListResponse:
      type: object
      required: [profanities, meta]
      properties:
        profanities:
          type: array
          items:
            $ref: '#/components/schemas/Profanity'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateProfanityRequest:
      type: object
      required: [word]
      properties:
        word:
          type: string
          maxLength: 255
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
          default: PARTIAL
        caseSensitive:
          type: boolean
          default: false

    UpdateProfanityRequest:
      type: object
      properties:
        word:
          type: string
          maxLength: 255
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
        caseSensitive:
          type: boolean

    ProfanityResponse:
      $ref: '#/components/schemas/Profanity'

    # ================================
    # 채팅방 생성/관리 스키마
    # ================================
    CreateRoomRequest:
      type: object
      required: [roomType, participants]
      description: |
        채팅방 생성 요청. **멱등성 보장**(SRS 7.2.1.4) — 동일 조건 재요청 시 신규 생성 없이 기존 방 반환(201 신규 / 200 기존).
        멱등성 키:
        - DM: 정렬한 `(userId1, userId2)` 사용자 조합
        - 그룹: `(moimType, moimId)`
        - 데이팅 DM: `matchId`
      properties:
        roomType:
          $ref: '#/components/schemas/ChatRoomType'
        name:
          type: string
          maxLength: 100
          description: 채팅방 이름 (그룹 채팅방 필수)
        participants:
          type: array
          items:
            type: object
            required: [userId]
            properties:
              userId:
                type: integer
              role:
                type: string
                enum: [HOST, MANAGER, MEMBER]
                default: MEMBER
          minItems: 1
          description: 초기 참여자 목록
        # 그룹 채팅방 (모임). GROUP이면 moimType+moimId 필수
        moimType:
          allOf:
            - $ref: '#/components/schemas/MoimType'
          nullable: true
          description: 모임 종류 (그룹 채팅방). SOCIALING / CLUB / CHALLENGE
        moimId:
          type: integer
          nullable: true
          description: 모임 ID (그룹 채팅방, 외부 참조)
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
          description: 매칭 ID (데이팅 DM)
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (데이팅 DM, Unix time ms)

    CreateRoomResponse:
      type: object
      required: [roomId, roomType, createdAt]
      properties:
        roomId:
          type: integer
          description: 채팅방 ID
        roomType:
          $ref: '#/components/schemas/ChatRoomType'
        name:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: integer
          format: int64
          description: 생성 시간 (Unix time ms)
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED]
          nullable: true
          description: 채팅방 상태 (데이팅 DM)

    AddParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          description: 추가할 사용자 ID
        role:
          type: string
          enum: [HOST, MANAGER, MEMBER]
          default: MEMBER
          description: 참여자 역할

    UpdateRoomStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVATED, EXPIRED]
          description: 변경할 상태

    UnreadCountResponse:
      type: object
      required: [totalUnreadCount]
      properties:
        totalUnreadCount:
          type: integer
          description: 전체 안읽은 메시지 수
        rooms:
          type: array
          items:
            type: object
            properties:
              roomId:
                type: integer
              unreadCount:
                type: integer
          description: 채팅방별 안읽은 메시지 수 (선택)

    # ================================
    # 관리자 채팅 조회 스키마
    # ================================
    AdminRoomListResponse:
      type: object
      required: [rooms, meta]
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/AdminRoomSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminRoomSummary:
      type: object
      required: [roomId, roomType, participantCount, messageCount, createdAt]
      properties:
        roomId:
          type: integer
        roomType:
          $ref: '#/components/schemas/ChatRoomType'
        name:
          type: string
          nullable: true
        participantCount:
          type: integer
        messageCount:
          type: integer
          description: 총 메시지 수
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        createdAt:
          type: integer
          format: int64

    AdminRoomDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AdminRoomSummary'
        - type: object
          properties:
            participants:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            lastMessageAt:
              type: integer
              format: int64
              nullable: true
            # 그룹 채팅방 (모임)
            moimType:
              allOf:
                - $ref: '#/components/schemas/MoimType'
              nullable: true
            moimId:
              type: integer
              nullable: true
            # 데이팅 DM
            matchId:
              type: integer
              nullable: true
            activatedAt:
              type: integer
              format: int64
              nullable: true
            chatExpiresAt:
              type: integer
              format: int64
              nullable: true

    AdminMessageListResponse:
      type: object
      required: [messages, meta]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AdminMessage'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminMessage:
      allOf:
        - $ref: '#/components/schemas/Message'
        - type: object
          properties:
            originalContent:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
              description: 블라인드 처리 전 원본 내용
            blindedAt:
              type: integer
              format: int64
              nullable: true
              description: 블라인드 처리 시간
            blindReason:
              type: string
              nullable: true
              description: 블라인드 사유

    AdminUpdateMessageRequest:
      type: object
      required: [isBlinded]
      properties:
        isBlinded:
          type: boolean
          description: 블라인드 처리 여부(true -> 블라인드, false -> 블라인드 해제)
        blindReason:
          type: string
          maxLength: 255
          description: 블라인드 사유 (isBlinded가 true일 때 권장)

    AdminMessageSearchResponse:
      type: object
      required: [messages, meta]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AdminMessageSearchItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminMessageSearchItem:
      type: object
      required: [id, roomId, type, content, sender, sentAt, isBlinded]
      properties:
        id:
          type: integer
          description: 메시지 ID
        roomId:
          type: integer
          description: 채팅방 ID
        type:
          $ref: '#/components/schemas/MessageType'
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
          description: 메시지 내용
        sender:
          $ref: '#/components/schemas/UserSummary'
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        isBlinded:
          type: boolean
        originalContent:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          nullable: true
          description: 블라인드 처리 전 원본 내용 (블라인드된 경우)