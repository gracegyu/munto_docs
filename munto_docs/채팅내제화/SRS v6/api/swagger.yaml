  # ================================
  # 메시지 API
  # ================================
  /rooms/{roomId}/messages:
    get:
      tags: [Messages]
      summary: 메시지 목록 조회
      description: |
        채팅방의 메시지 목록을 조회합니다. (SRS 7.3 참조)
        
        **페이지네이션 (커서 기반, 정렬 SSOT = `messages.id`):**
        - **정렬 기준은 `messages.id` 오름차순(ASC)** 이 기본이며 SRS 7.3.5·ERD와 동일하다. (`sent_at`이 아니라 `id`가 SSOT)
        - 커서 = **마지막으로 가진 메시지의 `id`** (불투명 토큰 아님, 순수 id 기반).
        - `after={id}`: 그 id **이후(더 큰 id, 더 최신)** 메시지로 확장 (재연결 갭 채우기·신규 로드)
        - `before={id}`: 그 id **이전(더 작은 id, 더 과거)** 메시지로 확장 (위로 스크롤 과거 내역)
        - `order`: 응답 정렬 방향(`asc` 기본 / `desc`). 화면 표시(최신 상단/하단)에 맞춰 선택. 정렬 키는 항상 `id`.
        
        **메시지 타입:**
        - TEXT: 텍스트 메시지
        - IMAGE: 이미지 메시지 (배열)
        - SYSTEM: 시스템 메시지
        - CHALLENGE_CHECKIN: 챌린지 체크인 (향후)
        - FEED: 클럽 피드 (향후)
        - POLL: 클럽 투표 (향후)
        
        **참고:** 메시지 전송은 Socket.IO `send_message` 이벤트 사용
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
        - name: order
          in: query
          required: false
          description: 응답 정렬 방향 (정렬 키는 항상 `messages.id`). 기본 asc(오름차순). 화면 표시에 맞춰 선택
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: 메시지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

