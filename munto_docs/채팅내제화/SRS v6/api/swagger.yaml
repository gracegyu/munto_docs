  # ================================
  # 안전 기능 (신고·차단은 채팅 서버 API 아님)
  # ================================
  # 신고(report)·차단(block) 모두 채팅 서버 API가 아니다.
  #  - 신고: 클라이언트가 각 앱 백엔드(데이팅 safety / 문토 report) 신고 API를 직접 호출.
  #          자동 신고(외부 링크 등)는 채팅 서버가 앱 백엔드로 S2S 전달. (SRS 7.6.6)
  #  - 차단: 매칭·프로필·소셜링 등 앱 전역에 영향 → 차단 SOT는 각 앱 백엔드. 클라이언트가
  #          앱 백엔드 차단 API를 직접 호출하고, 채팅 강제는 이벤트 기반(앱 백엔드 → 채팅 서버
  #          S2S로 해당 DM 방 종료/강제 퇴장; 신규 DM 생성은 앱 백엔드가 차단 확인 후 요청). (SRS 7.6.7)
  # 채팅 서버의 방 종료/강제 퇴장은 기존 방 상태 변경 API(PATCH /rooms/{roomId}, x-audience: backend →
  # DATING_DM은 EXPIRED 처리)를 재사용한다. 별도 차단 전용 엔드포인트는 두지 않는다.

  # ================================
  # 이미지 업로드 API
  # ================================
  /upload/presigned-url:
    post:
      tags: [Upload]
      summary: 이미지 업로드 Presigned URL 발급
      description: |
        S3 이미지 업로드를 위한 Presigned URL을 발급합니다. (SRS 7.3.2 참조)
        
        **업로드 제한:**
        - 이미지당 최대 10MB
        - 한 번에 최대 10개 URL 발급 가능
        - 지원 형식: JPEG, PNG, GIF, WebP

        **참고:** 부적절한 이미지 자동 감지(모더레이션)는 **V1 미포함**이다 (SRS 7.6.5 TBD — 필요 시 별도 기획 후 도입).
        
        **업로드 흐름:**
        1. 이 API로 Presigned URL 발급
        2. 클라이언트에서 S3에 직접 업로드
        3. 업로드 완료 후 Socket.IO로 메시지 전송
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlRequest'
      responses:
        '200':
          description: Presigned URL 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ================================
  # 관리자 API (백오피스)
  # ================================
  /admin/rooms:
    get:
      tags: [Admin]
      summary: 채팅방 목록 조회 (관리자)
      description: |
        모든 채팅방 목록을 조회합니다. (SRS 7.8 참조)
        
        **필터:**
        - roomType: 채팅방 유형
        - roomStatus: 채팅방 상태 (데이팅 DM)
        - createdAfter/createdBefore: 생성일 범위
      security:
        - AdminAuth: []
      parameters:
        - name: roomType
          in: query
          schema:
            $ref: '#/components/schemas/ChatRoomType'
          description: 채팅방 유형 필터
        - name: roomStatus
          in: query
          schema:
            type: string
            enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          description: 채팅방 상태 필터 (데이팅 DM)
        - name: createdAfter
          in: query
          schema:
            type: integer
            format: int64
          description: 생성일 시작 (Unix time ms)
        - name: createdBefore
          in: query
          schema:
            type: integer
            format: int64
          description: 생성일 종료 (Unix time ms)
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 채팅방 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

