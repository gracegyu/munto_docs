openapi: 3.0.3
info:
  title: 채팅 서비스 API
  description: |
    채팅 서비스의 RESTful API 명세서입니다.
    
    ## 관련 문서
    - [SRS 문서](./srs.md) - 요구사항 명세서
    - [ERD 문서](./erd.md) - 데이터베이스 스키마
    - [Socket.IO Events 문서](./socket-events.md) - Socket.IO 이벤트 명세

    ## 주요 기능
    - 채팅방 관리 (생성, 조회, 나가기)
    - 메시지 조회 (전송은 Socket.IO)
    - 공지 설정/해제
    - 푸시 알림 설정
    - 안전 기능: 신고·차단 모두 각 앱 백엔드(데이팅 / 문토)가 소유 — 채팅 서버 API 아님 (차단은 이벤트 기반 강제만)
    - 이미지 업로드 (Presigned URL)
    - 관리자 기능 (백오피스)

    ## 전환 단계(V1~V4) 활성화 — 추적용 태그 (SRS 2.7)
    API는 단계별로 쪼개 만들지 않고 V1~V4 전체를 미리 설계하되, 각 엔드포인트가 어느 단계에서 활성·필수가 되는지를 **각 endpoint의 `summary` 끝에 단계 태그**로 표기한다.
    - 표기 규칙: 7장과 동일하게 **태그가 없으면 V1**(데이팅 DM 개통 필수). V2 이후 활성 엔드포인트만 `[V2+]`/`[V3]`/`[V4]`로 표기한다.
    - **V1 (태그 없음)**: 채팅방 조회/생성(DM)/나가기/참여자/사진/공지, 메시지 조회, 이미지 업로드, 푸시 알림 설정, 관리자(채팅 조회·모니터링·블라인드·메시지 삭제·감사로그). 신고·차단은 앱 백엔드 소유
    - **[V2+]**: 관리자 메시지 검색·금칙어 관리. 델타 동기화 `sync` 엔드포인트는 V2 설계 시 추가 예정(현재 미포함)
    - **[V3]/[V4]**: 그룹 채팅방 생성(소셜링=V3 / 클럽·챌린지=V4). 특수 기능(인증·투표 등) 데이터는 문토 백엔드 소유
    - 단계별 백오피스 기능 범위는 SRS 7.8 태그 참조

    ## 호출 주체 구분 (`x-audience`)
    각 엔드포인트에 호출 주체를 `x-audience`로 표기한다(SDK·BE 팀 경계 혼동 방지).
    - `backend`: **서버-투-서버 전용** (문토/데이팅 백엔드가 호출) — 채팅방 생성, 참여자 추가/제거, 채팅방 상태 변경
    - `client`: 앱(SDK)이 호출 — 목록·메시지 조회, 설정, 업로드 등 (태그 없으면 client). 신고·차단은 앱 백엔드 직접 호출(채팅 서버 경유 X)
    - `admin`: 백오피스(AdminAuth) — `/admin/*`

    ## 인증
    모든 API는 Bearer Token 인증을 사용합니다.
    ```
    Authorization: Bearer {access_token}
    ```
    JWT 토큰은 문토 백엔드 또는 데이팅 백엔드에서 발급받습니다.

    ## 실시간 통신
    메시지 전송/수신, 읽음 처리, 입력 중 표시 등 실시간 기능은 Socket.IO를 사용합니다.
    ```
    wss://chat-server.munto.kr/?token={access_token}
    ```
    상세 이벤트는 [Socket.IO Events 문서](./socket-events.md)를 참조하세요.

    ## 에러 코드
    - 400: Bad Request - 잘못된 요청
    - 401: Unauthorized - 인증 실패
    - 403: Forbidden - 권한 없음
    - 404: Not Found - 리소스 없음
    - 429: Too Many Requests - 요청 제한 초과 (Rate Limit)
    - 500: Internal Server Error - 서버 오류

    ## 시간 형식
    모든 시간 필드는 Unix time milliseconds를 사용합니다.

  version: 1.0.0
  contact:
    name: 문토 개발팀
    email: dev@munto.kr
  license:
    name: Private

servers:
  - url: https://chat.api.munto.kr/api/v1
    description: Production server
  - url: https://chat-dev.api.munto.kr/api/v1
    description: Development server
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: Chat Rooms
    description: 채팅방 관리 API
  - name: Messages
    description: 메시지 조회 API (전송은 Socket.IO)
  - name: Announcements
    description: 공지사항 관리 API
  - name: Notifications
    description: 푸시 알림 설정 API
  - name: Upload
    description: 이미지 업로드 API
  - name: Admin
    description: 관리자 기능 API (백오피스). 모든 `/admin/*`는 `AdminAuth`(UserGrade.ADMIN) 필요, 권한 미달 시 403

paths:
  # ================================
  # 채팅방 관리 API
  # ================================
  /rooms:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 목록 조회
      description: |
        사용자가 참여한 채팅방 목록을 조회합니다. (SRS 7.2.2 참조)
        
        **기본 필터링(항상 적용):**
        - 만료된 채팅방 제외 (EXPIRED)
        - 나간 채팅방 제외 (LEFT)
        
        **선택 필터(`type` 쿼리):**
        - 생략 시 전체 유형 반환
        - `GROUP`(그룹: 소셜링/클럽/챌린지) / `DM`(문토 DM) / `DATING_DM`(데이팅 DM) 중 하나로 필터
        - DM 탭(문토 DM + 데이팅 DM)처럼 묶어 보려면 클라이언트에서 두 유형을 합치거나 다중 호출
        
        **그룹 세부 필터(`moimType` 쿼리, 그룹 한정):**
        - `type=GROUP`일 때 모임 종류로 추가 필터: `SOCIALING` / `CLUB` / `CHALLENGE`
        - 서버는 채팅방의 `moimType` 컬럼으로 판별
        - 그룹 채팅은 V3~(소셜링=V3, 클럽·챌린지=V4)이므로 V1·V2에선 결과 없음
        
        **정렬:**
        - 최근 메시지 시간(`lastMessageAt`) 기준 내림차순
        - 메시지가 없으면 생성 시간(`createdAt`) 기준
        
        **참고:** 실시간 업데이트는 Socket.IO `chat_list`, `chat_list_updated` 이벤트로 수신
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: 채팅방 유형 필터 (생략 시 전체). `chat_room_type` enum
          schema:
            $ref: '#/components/schemas/ChatRoomType'
        - name: moimType
          in: query
          required: false
          description: 그룹 세부 모임 종류 필터 (type=GROUP일 때 의미 있음, 생략 시 그룹 전체). 그룹은 V3~
          schema:
            $ref: '#/components/schemas/MoimType'
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 채팅방 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Chat Rooms]
      summary: 채팅방 생성 (DM=V1, 그룹 채팅방 생성은 [V3 소셜링 / V4 클럽·챌린지])
      x-audience: backend   # 서버-투-서버 (문토/데이팅 백엔드가 호출)
      description: |
        채팅방을 생성합니다. (SRS 7.2.1 참조)
        
        **채팅방 유형별 호출 주체:** 모든 유형이 백엔드에서 채팅 서버로 호출합니다 (서버 간 통신)
        - **그룹 (GROUP):** 소셜링/클럽/챌린지 생성 시 문토 백엔드에서 호출
        - **DM:** 사용자가 상대방에게 DM 전송 시도 시 문토 백엔드에서 호출
        - **데이팅 DM (DATING_DM):** 친구 신청 수락 시 데이팅 백엔드에서 호출
        
        **자동 처리:**
        - 관리자(문토봇) 자동 추가
        - 호스트/참여자 자동 추가
        
        **멱등성 보장:**
        - 동일한 조건((moimType, moimId), matchId, 사용자 조합 등)으로 재요청 시 기존 채팅방 반환
        - 네트워크 타임아웃 후 재시도해도 중복 생성되지 않음
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: 채팅방 신규 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
              example:
                roomId: 12345
                roomType: GROUP
                name: "소셜링 채팅방"
                participantCount: 5
                createdAt: 1704067200000
        '200':
          description: 기존 채팅방 반환 (멱등성 - 동일 조건으로 이미 생성된 채팅방 존재)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
              example:
                roomId: 12345
                roomType: GROUP
                name: "소셜링 채팅방"
                participantCount: 5
                createdAt: 1704067200000
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 상세 정보 조회
      description: |
        채팅방 진입 시 표시되는 상세 정보를 조회합니다. (SRS 7.2.3 참조)
        
        **포함 정보:**
        - 채팅방 기본 정보 (ID, 제목, 타입)
        - 참여자 수
        - 마지막 메시지 정보
        - 데이팅 DM: 활성화 여부, 남은 일수, 만료 시간
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 채팅방 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Chat Rooms]
      summary: 채팅방 상태 변경
      x-audience: backend   # 서버-투-서버 (데이팅 백엔드: 결제 후 활성화 등)
      description: |
        채팅방 상태를 변경합니다. (SRS 7.2.1.3 참조)
        
        **호출 주체:** 데이팅 백엔드 (서버 간 통신)
        
        **상태 변경:**
        - `CREATED` → `ACTIVATED`: 사용자가 재화 차감하여 채팅방 활성화
        - `ACTIVATED` → `EXPIRED`: 만료 시간 경과 (배치 또는 수동)
        
        **활성화 시 처리:**
        - `activatedAt` 설정
        - `chatExpiresAt` = `activatedAt` + 30일

        **차단 이벤트 처리 (SRS 7.6.7):** 앱 백엔드가 사용자 차단을 감지하면 이 엔드포인트로 DATING_DM 상태를 `EXPIRED`로 변경 요청해 방을 강제 종료한다(차단은 별도 엔드포인트 없이 상태 변경 재사용, 감사 로그 `FORCE_LEAVE`).
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomStatusRequest'
      responses:
        '200':
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Chat Rooms]
      summary: 채팅방 나가기
      description: |
        채팅방에서 나갑니다. (SRS 7.2.4 참조)
        
        **문토 채팅방:**
        - 사용자만 채팅방에서 제외
        - 다른 참여자는 계속 사용 가능
        
        **데이팅 DM:**
        - 채팅방 상태가 `LEFT`로 변경
        - 양쪽 모두 나가도 DB에 이력으로 남음
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 채팅방 나가기 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/participants:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 참여자 목록 조회
      description: |
        채팅방에 참여한 모든 사용자 목록을 조회합니다. (SRS 7.2.5 참조)
        
        **참여자 정보:**
        - 사용자 ID, 닉네임, 프로필 사진
        - 역할 (HOST, MANAGER, MEMBER, ADMINISTRATOR)
        
        **정렬:** 역할 우선 (HOST > MANAGER > MEMBER), 참여 시간 순
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 참여자 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Chat Rooms]
      summary: 참여자 추가
      x-audience: backend   # 서버-투-서버 (모임 참여 시 백엔드가 호출)
      description: |
        채팅방에 참여자를 추가합니다. (SRS 7.2.1.1 참조)
        
        **호출 주체:** 문토 백엔드 (서버 간 통신)
        
        **사용 시점:**
        - 사용자가 소셜링/클럽/챌린지에 참여할 때
        - 문토 백엔드에서 모임 참여 처리 후 채팅 서버에 요청
        
        **자동 처리:**
        - Socket.IO Room에 자동 Join
        - 기존 참여자들에게 입장 알림 전송
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
      responses:
        '201':
          description: 참여자 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/participants/{userId}:
    delete:
      tags: [Chat Rooms]
      summary: 참여자 제거
      x-audience: backend   # 서버-투-서버 (모임 탈퇴/강퇴 시 백엔드가 호출)
      description: |
        채팅방에서 참여자를 제거합니다. (SRS 7.2.1.1 참조)
        
        **호출 주체:** 문토 백엔드 (서버 간 통신)
        
        **사용 시점:**
        - 사용자가 소셜링/클럽/챌린지에서 나갈 때
        - 호스트/매니저가 참여자를 강퇴할 때
        
        **자동 처리:**
        - Socket.IO Room에서 Leave
        - 남은 참여자들에게 퇴장 알림 전송
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 제거할 사용자 ID
      responses:
        '200':
          description: 참여자 제거 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/images:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 사진 모아보기
      description: |
        채팅방에서 전송된 모든 이미지를 조회합니다. (SRS 7.2.6 참조)
        
        **특징:**
