# ================================
# Components
# ================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 문토/데이팅 백엔드에서 발급받은 JWT 토큰

  parameters:
    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
      description: 채팅방 ID

    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: integer
      description: 메시지 ID

    CursorAfter:
      name: after
      in: query
      schema:
        type: string
      description: 커서 기반 페이지네이션 - 다음 페이지 커서

    CursorBefore:
      name: before
      in: query
      schema:
        type: string
      description: 커서 기반 페이지네이션 - 이전 페이지 커서

    Count:
      name: count
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: 한 페이지당 항목 수

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: 서버 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ================================
    # 공통 스키마
    # ================================
    SuccessResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "요청이 성공적으로 처리되었습니다."

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "인증이 필요합니다."

    PaginationMeta:
      type: object
      properties:
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
        hasPrevious:
          type: boolean
          description: 이전 페이지 존재 여부
        nextCursor:
          type: string
          nullable: true
          description: 다음 페이지 커서
        previousCursor:
          type: string
          nullable: true
          description: 이전 페이지 커서

    # ================================
    # 사용자 스키마
    # ================================
    UserSummary:
      type: object
      required: [userId, nickname]
      properties:
        userId:
          type: integer
          example: 123
        nickname:
          type: string
          example: "문토유저"
        profilePhotoUrl:
          type: string
          nullable: true
          example: "https://s3.../profile.jpg"

    Participant:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          required: [role, joinedAt]
          properties:
            role:
              type: string
              enum: [HOST, MANAGER, MEMBER, ADMINISTRATOR]
              description: 참여자 역할
            joinedAt:
              type: integer
              format: int64
              description: 참여 시간 (Unix time ms)
              example: 1704067200000

    # ================================
    # 채팅방 스키마
    # ================================
    ChatRoomSummary:
      type: object
      required: [roomId, roomType, name, unreadCount]
      properties:
        roomId:
          type: integer
          example: 1
        roomType:
          type: string
          enum: [GROUP, DM, DATING_DM]
        name:
          type: string
          example: "1월 북클럽 모임"
        thumbnailUrl:
          type: string
          nullable: true
        unreadCount:
          type: integer
          example: 3
        lastMessage:
          $ref: '#/components/schemas/LastMessage'
        # 그룹 채팅방
        socialingId:
          type: integer
          nullable: true
        clubId:
          type: integer
          nullable: true
        challengeId:
          type: integer
          nullable: true
        # DM 채팅방
        otherUser:
          $ref: '#/components/schemas/UserSummary'
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (Unix time ms)

    LastMessage:
      type: object
      nullable: true
      properties:
        content:
          type: string
          example: "안녕하세요!"
          description: 메시지 내용 (이미지면 "사진")
        type:
          type: string
          enum: [TEXT, IMAGE, SYSTEM]
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        sender:
          $ref: '#/components/schemas/UserSummary'

    ChatRoomListResponse:
      type: object
      required: [rooms, meta]
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/ChatRoomSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ChatRoomDetailResponse:
      type: object
      required: [roomId, roomType, name, participantCount, createdAt]
      properties:
        roomId:
          type: integer
        roomType:
          type: string
          enum: [GROUP, DM, DATING_DM]
        name:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: integer
          format: int64
          description: 생성 시간 (Unix time ms)
        lastMessage:
          $ref: '#/components/schemas/LastMessage'
        # 그룹 채팅방
        socialingId:
          type: integer
          nullable: true
        clubId:
          type: integer
          nullable: true
        challengeId:
          type: integer
          nullable: true
        # DM 채팅방
        otherUser:
          $ref: '#/components/schemas/UserSummary'
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        activatedAt:
          type: integer
          format: int64
          nullable: true
          description: 활성화 시간 (Unix time ms)
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (Unix time ms)
        remainingDays:
          type: integer
          nullable: true
          description: 만료까지 남은 일수

    ParticipantListResponse:
      type: object
      required: [participants]
      properties:
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'

    # ================================
    # 메시지 스키마
    # ================================
    Message:
      type: object
      required: [id, roomId, type, content, sender, sentAt, isAnnouncement, isBlinded]
      properties:
        id:
          type: integer
        roomId:
          type: integer
        type:
          type: string
          enum: [TEXT, IMAGE, SYSTEM, CHALLENGE_CHECKIN, FEED, POLL]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
          description: |
            메시지 내용
            - TEXT: 문자열
            - IMAGE: URL 배열
            - SYSTEM: 객체
            - CHALLENGE_CHECKIN/FEED/POLL: 객체
        sender:
          $ref: '#/components/schemas/UserSummary'
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        isAnnouncement:
          type: boolean
        isBlinded:
          type: boolean
        unreadCount:
          type: integer
          description: 이 메시지를 안 읽은 사람 수

    MessageListResponse:
      type: object
      required: [messages, meta]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 이미지 스키마
    # ================================
    ImageItem:
      type: object
      required: [imageUrl, messageId, sentAt, sender]
      properties:
        imageUrl:
          type: string
          description: 이미지 URL
        thumbnailUrl:
          type: string
          description: 썸네일 URL
        messageId:
          type: integer
          description: 원본 메시지 ID
        sentAt:
          type: integer
          format: int64
          description: 전송 시간 (Unix time ms)
        sender:
          $ref: '#/components/schemas/UserSummary'

    ImageListResponse:
      type: object
      required: [images, meta]
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 공지사항 스키마
    # ================================
    Announcement:
      type: object
      required: [messageId, content, type, setBy, setAt]
      properties:
        messageId:
          type: integer
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        type:
          type: string
          enum: [TEXT, IMAGE]
        setBy:
          $ref: '#/components/schemas/UserSummary'
        setAt:
          type: integer
          format: int64
          description: 공지 설정 시간 (Unix time ms)

    AnnouncementListResponse:
      type: object
      required: [announcements, meta]
      properties:
        announcements:
          type: array
          items:
            $ref: '#/components/schemas/Announcement'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 알림 설정 스키마
    # ================================
    RoomNotificationSettingResponse:
      type: object
      required: [roomId, enabled]
      properties:
        roomId:
          type: integer
        enabled:
          type: boolean
          description: 알림 켜기/끄기

    UpdateRoomNotificationRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: 알림 켜기/끄기

    # ================================
    # 신고 스키마
    # ================================
    CreateReportRequest:
      type: object
      required: [targetType, targetId, reportType]
      properties:
        targetType:
          type: string
          enum: [MESSAGE, USER]
          description: 신고 대상 타입
        targetId:
          type: integer
          description: 신고 대상 ID (메시지 ID 또는 사용자 ID)
        reportType:
          type: string
          enum: [SPAM, PROFANITY, SEXUAL_CONTENT, HARASSMENT, OTHER]
        reason:
          type: string
          maxLength: 500
          description: 상세 사유 (선택)
        evidenceUrls:
          type: array
          items:
            type: string
          maxItems: 5
          description: 증거 이미지 URL (최대 5개)

    ReportResponse:
      type: object
      required: [reportId, reportNumber, status, createdAt]
      properties:
        reportId:
          type: integer
        reportNumber:
          type: string
          example: "RPT-20240101-001"
          description: 접수 번호
        status:
          type: string
          enum: [PENDING, REVIEWING, RESOLVED, REJECTED]
        createdAt:
          type: integer
          format: int64
          description: 접수 시간 (Unix time ms)

    # ================================
    # 차단 스키마
    # ================================
    CreateBlockRequest:
      type: object
      required: [blockedUserId]
      properties:
        blockedUserId:
          type: integer
          description: 차단할 사용자 ID

    BlockedUser:
      type: object
      required: [blockedUser, blockedAt]
      properties:
        blockedUser:
          $ref: '#/components/schemas/UserSummary'
        blockedAt:
          type: integer
          format: int64
          description: 차단 시간 (Unix time ms)

    BlockListResponse:
      type: object
      required: [blocks, meta]
      properties:
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/BlockedUser'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ================================
    # 업로드 스키마
    # ================================
    PresignedUrlRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: object
            required: [filename, contentType]
            properties:
              filename:
                type: string
                example: "image1.jpg"
              contentType:
                type: string
                enum: [image/jpeg, image/png, image/gif, image/webp, image/heic]
          minItems: 1
          maxItems: 10
          description: 업로드할 파일 정보 (최대 10개)

    PresignedUrlResponse:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: object
            required: [uploadUrl, imageUrl]
            properties:
              uploadUrl:
                type: string
                description: S3 업로드용 Presigned URL
              imageUrl:
                type: string
                description: 업로드 완료 후 접근 가능한 이미지 URL

    # ================================
    # 관리자 스키마
    # ================================
    AdminReportSummary:
      type: object
      required: [reportId, reportNumber, targetType, reportType, status, isAuto, createdAt]
      properties:
        reportId:
          type: integer
        reportNumber:
          type: string
        targetType:
          type: string
          enum: [MESSAGE, USER]
        reportType:
          type: string
          enum: [SPAM, PROFANITY, SEXUAL_CONTENT, HARASSMENT, EXTERNAL_LINK, OTHER]
        status:
          type: string
          enum: [PENDING, REVIEWING, RESOLVED, REJECTED]
        isAuto:
          type: boolean
          description: 자동 신고 여부
        reporter:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: integer
          format: int64

    AdminReportListResponse:
      type: object
      required: [reports, meta]
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/AdminReportSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminReportDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AdminReportSummary'
        - type: object
          properties:
            targetId:
              type: integer
            reason:
              type: string
              nullable: true
            evidenceUrls:
              type: array
              items:
                type: string
            reviewedAt:
              type: integer
              format: int64
              nullable: true
            resolvedAt:
              type: integer
              format: int64
              nullable: true

    UpdateReportStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [REVIEWING, RESOLVED, REJECTED]

    # ================================
    # 금칙어 스키마
    # ================================
    Profanity:
      type: object
      required: [id, word, matchType, caseSensitive]
      properties:
        id:
          type: integer
        word:
          type: string
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
          description: 일치 타입 (부분/완전)
        caseSensitive:
          type: boolean
          description: 대소문자 구분

    ProfanityListResponse:
      type: object
      required: [profanities, meta]
      properties:
        profanities:
          type: array
          items:
            $ref: '#/components/schemas/Profanity'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateProfanityRequest:
      type: object
      required: [word]
      properties:
        word:
          type: string
          maxLength: 255
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
          default: PARTIAL
        caseSensitive:
          type: boolean
          default: false

    UpdateProfanityRequest:
      type: object
      properties:
        word:
          type: string
          maxLength: 255
        matchType:
          type: string
          enum: [PARTIAL, EXACT]
        caseSensitive:
          type: boolean

    ProfanityResponse:
      $ref: '#/components/schemas/Profanity'

    # ================================
    # 채팅방 생성/관리 스키마
    # ================================
    CreateRoomRequest:
      type: object
      required: [roomType, participants]
      properties:
        roomType:
          type: string
          enum: [GROUP, DM, DATING_DM]
          description: 채팅방 유형
        name:
          type: string
          maxLength: 100
          description: 채팅방 이름 (그룹 채팅방 필수)
        participants:
          type: array
          items:
            type: object
            required: [userId]
            properties:
              userId:
                type: integer
              role:
                type: string
                enum: [HOST, MANAGER, MEMBER]
                default: MEMBER
          minItems: 1
          description: 초기 참여자 목록
        # 그룹 채팅방
        socialingId:
          type: integer
          nullable: true
          description: 소셜링 ID (소셜링 채팅방)
        clubId:
          type: integer
          nullable: true
          description: 클럽 ID (클럽 채팅방)
        challengeId:
          type: integer
          nullable: true
          description: 챌린지 ID (챌린지 채팅방)
        # 데이팅 DM
        matchId:
          type: integer
          nullable: true
          description: 매칭 ID (데이팅 DM)
        chatExpiresAt:
          type: integer
          format: int64
          nullable: true
          description: 채팅 만료 시간 (데이팅 DM, Unix time ms)

    CreateRoomResponse:
      type: object
      required: [roomId, roomType, createdAt]
      properties:
        roomId:
          type: integer
          description: 채팅방 ID
        roomType:
          type: string
          enum: [GROUP, DM, DATING_DM]
        name:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: integer
          format: int64
          description: 생성 시간 (Unix time ms)
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED]
          nullable: true
          description: 채팅방 상태 (데이팅 DM)

    AddParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          description: 추가할 사용자 ID
        role:
          type: string
          enum: [HOST, MANAGER, MEMBER]
          default: MEMBER
          description: 참여자 역할

    UpdateRoomStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVATED, EXPIRED]
          description: 변경할 상태

    UnreadCountResponse:
      type: object
      required: [totalUnreadCount]
      properties:
        totalUnreadCount:
          type: integer
          description: 전체 안읽은 메시지 수
        rooms:
          type: array
          items:
            type: object
            properties:
              roomId:
                type: integer
              unreadCount:
                type: integer
          description: 채팅방별 안읽은 메시지 수 (선택)

    # ================================
    # 관리자 채팅 조회 스키마
    # ================================
    AdminRoomListResponse:
      type: object
      required: [rooms, meta]
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/AdminRoomSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminRoomSummary:
      type: object
      required: [roomId, roomType, participantCount, messageCount, createdAt]
      properties:
        roomId:
          type: integer
        roomType:
          type: string
          enum: [GROUP, DM, DATING_DM]
        name:
          type: string
          nullable: true
        participantCount:
          type: integer
        messageCount:
          type: integer
          description: 총 메시지 수
        roomStatus:
          type: string
          enum: [CREATED, ACTIVATED, EXPIRED, LEFT]
          nullable: true
        createdAt:
          type: integer
          format: int64

    AdminRoomDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AdminRoomSummary'
        - type: object
          properties:
            participants:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            lastMessageAt:
              type: integer
              format: int64
              nullable: true
            # 그룹 채팅방
            socialingId:
              type: integer
              nullable: true
            clubId:
              type: integer
              nullable: true
            challengeId:
              type: integer
              nullable: true
            # 데이팅 DM
            matchId:
              type: integer
              nullable: true
            activatedAt:
              type: integer
              format: int64
              nullable: true
            chatExpiresAt:
              type: integer
              format: int64
              nullable: true

    AdminMessageListResponse:
      type: object
      required: [messages, meta]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AdminMessage'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AdminMessage:
      allOf:
        - $ref: '#/components/schemas/Message'
        - type: object
          properties:
            originalContent:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
              description: 블라인드 처리 전 원본 내용
            blindedAt:
              type: integer
              format: int64
              nullable: true
              description: 블라인드 처리 시간
            blindReason:
              type: string
              nullable: true
              description: 블라인드 사유
