      summary: 신고하기
      description: |
        메시지 또는 사용자를 신고합니다. (SRS 7.6.3 참조)
        
        **신고 사유:**
        - SPAM: 스팸/광고
        - PROFANITY: 욕설
        - SEXUAL_CONTENT: 성적 표현
        - HARASSMENT: 괴롭힘
        - OTHER: 기타
        
        **자동 신고:**
        - 외부 링크 포함 메시지는 서버에서 자동 신고 처리
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
