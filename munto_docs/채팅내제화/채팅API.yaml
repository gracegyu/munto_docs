openapi: 3.0.3
info:
  title: 채팅 서비스 API
  description: |
    채팅 서비스의 RESTful API 명세서입니다.
    
    ## 관련 문서
    - [SRS 문서](./srs.md) - 요구사항 명세서
    - [ERD 문서](./erd.md) - 데이터베이스 스키마
    - [WebSocket Events 문서](./websocket-events.md) - Socket.IO 이벤트 명세

    ## 주요 기능
    - 채팅방 관리 (생성, 조회, 나가기)
    - 메시지 조회 (전송은 Socket.IO)
    - 공지 설정/해제
    - 푸시 알림 설정
    - 안전 기능 (신고, 차단)
    - 이미지 업로드 (Presigned URL)
    - 관리자 기능 (백오피스)

    ## 인증
    모든 API는 Bearer Token 인증을 사용합니다.
    ```
    Authorization: Bearer {access_token}
    ```
    JWT 토큰은 문토 백엔드 또는 데이팅 백엔드에서 발급받습니다.

    ## 실시간 통신
    메시지 전송/수신, 읽음 처리, 입력 중 표시 등 실시간 기능은 Socket.IO를 사용합니다.
    ```
    wss://chat-server.munto.kr/?token={access_token}
    ```
    상세 이벤트는 [WebSocket Events 문서](./websocket-events.md)를 참조하세요.

    ## 에러 코드
    - 400: Bad Request - 잘못된 요청
    - 401: Unauthorized - 인증 실패
    - 403: Forbidden - 권한 없음
    - 404: Not Found - 리소스 없음
    - 429: Too Many Requests - 요청 제한 초과 (Rate Limit)
    - 500: Internal Server Error - 서버 오류

    ## 시간 형식
    모든 시간 필드는 Unix time milliseconds를 사용합니다.

  version: 1.0.0
  contact:
    name: 문토 개발팀
    email: dev@munto.kr
  license:
    name: Private

servers:
  - url: https://chat.api.munto.kr/api/v1
    description: Production server
  - url: https://chat-dev.api.munto.kr/api/v1
    description: Development server
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: Chat Rooms
    description: 채팅방 관리 API
  - name: Messages
    description: 메시지 조회 API (전송은 Socket.IO)
  - name: Announcements
    description: 공지사항 관리 API
  - name: Notifications
    description: 푸시 알림 설정 API
  - name: Safety
    description: 안전 기능 API (신고, 차단)
  - name: Upload
    description: 이미지 업로드 API
  - name: Admin
    description: 관리자 기능 API (백오피스)

paths:
  # ================================
  # 채팅방 관리 API
  # ================================
  /rooms:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 목록 조회
      description: |
        사용자가 참여한 채팅방 목록을 조회합니다. (SRS 7.2.2 참조)
        
        **필터링:**
        - 만료된 채팅방 제외 (EXPIRED)
        - 나간 채팅방 제외 (LEFT)
        
        **정렬:**
        - 최근 메시지 시간(`lastMessageAt`) 기준 내림차순
        - 메시지가 없으면 생성 시간(`createdAt`) 기준
        
        **참고:** 실시간 업데이트는 Socket.IO `chat_list`, `chat_list_updated` 이벤트로 수신
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 채팅방 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Chat Rooms]
      summary: 채팅방 생성
      description: |
        채팅방을 생성합니다. (SRS 7.2.1 참조)
        
        **호출 주체:** 문토 백엔드 또는 데이팅 백엔드 (서버 간 통신)
        
        **채팅방 유형별 생성:**
        - **그룹 (GROUP):** 소셜링/클럽/챌린지 생성 시 문토 백엔드에서 호출
        - **DM:** 사용자가 DM 전송 시도 시 문토 백엔드에서 호출
        - **데이팅 DM (DATING_DM):** 친구 신청 수락 시 데이팅 백엔드에서 호출
        
        **자동 처리:**
        - 관리자(문토봇) 자동 추가
        - 호스트/참여자 자동 추가
        
        **멱등성 보장:**
        - 동일한 조건(socialingId, clubId, matchId, 사용자 조합 등)으로 재요청 시 기존 채팅방 반환
        - 네트워크 타임아웃 후 재시도해도 중복 생성되지 않음
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: 채팅방 신규 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
              example:
                roomId: 12345
                roomType: GROUP
                name: "소셜링 채팅방"
                participantCount: 5
                createdAt: 1704067200000
        '200':
          description: 기존 채팅방 반환 (멱등성 - 동일 조건으로 이미 생성된 채팅방 존재)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
              example:
                roomId: 12345
                roomType: GROUP
                name: "소셜링 채팅방"
                participantCount: 5
                createdAt: 1704067200000
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 상세 정보 조회
      description: |
        채팅방 진입 시 표시되는 상세 정보를 조회합니다. (SRS 7.2.3 참조)
        
        **포함 정보:**
        - 채팅방 기본 정보 (ID, 제목, 타입)
        - 참여자 수
        - 마지막 메시지 정보
        - 데이팅 DM: 활성화 여부, 남은 일수, 만료 시간
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 채팅방 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Chat Rooms]
      summary: 채팅방 상태 변경
      description: |
        채팅방 상태를 변경합니다. (SRS 7.2.1.3 참조)
        
        **호출 주체:** 데이팅 백엔드 (서버 간 통신)
        
        **상태 변경:**
        - `CREATED` → `ACTIVATED`: 사용자가 재화 차감하여 채팅방 활성화
        - `ACTIVATED` → `EXPIRED`: 만료 시간 경과 (배치 또는 수동)
        
        **활성화 시 처리:**
        - `activatedAt` 설정
        - `chatExpiresAt` = `activatedAt` + 30일
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomStatusRequest'
      responses:
        '200':
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoomDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Chat Rooms]
      summary: 채팅방 나가기
      description: |
        채팅방에서 나갑니다. (SRS 7.2.4 참조)
        
        **문토 채팅방:**
        - 사용자만 채팅방에서 제외
        - 다른 참여자는 계속 사용 가능
        
        **데이팅 DM:**
        - 채팅방 상태가 `LEFT`로 변경
        - 양쪽 모두 나가도 DB에 이력으로 남음
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 채팅방 나가기 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/participants:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 참여자 목록 조회
      description: |
        채팅방에 참여한 모든 사용자 목록을 조회합니다. (SRS 7.2.5 참조)
        
        **참여자 정보:**
        - 사용자 ID, 닉네임, 프로필 사진
        - 역할 (HOST, MANAGER, MEMBER, ADMINISTRATOR)
        
        **정렬:** 역할 우선 (HOST > MANAGER > MEMBER), 참여 시간 순
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: 참여자 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Chat Rooms]
      summary: 참여자 추가
      description: |
        채팅방에 참여자를 추가합니다. (SRS 7.2.1.1 참조)
        
        **호출 주체:** 문토 백엔드 (서버 간 통신)
        
        **사용 시점:**
        - 사용자가 소셜링/클럽/챌린지에 참여할 때
        - 문토 백엔드에서 모임 참여 처리 후 채팅 서버에 요청
        
        **자동 처리:**
        - Socket.IO Room에 자동 Join
        - 기존 참여자들에게 입장 알림 전송
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
      responses:
        '201':
          description: 참여자 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/participants/{userId}:
    delete:
      tags: [Chat Rooms]
      summary: 참여자 제거
      description: |
        채팅방에서 참여자를 제거합니다. (SRS 7.2.1.1 참조)
        
        **호출 주체:** 문토 백엔드 (서버 간 통신)
        
        **사용 시점:**
        - 사용자가 소셜링/클럽/챌린지에서 나갈 때
        - 호스트/매니저가 참여자를 강퇴할 때
        
        **자동 처리:**
        - Socket.IO Room에서 Leave
        - 남은 참여자들에게 퇴장 알림 전송
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 제거할 사용자 ID
      responses:
        '200':
          description: 참여자 제거 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/images:
    get:
      tags: [Chat Rooms]
      summary: 채팅방 사진 모아보기
      description: |
        채팅방에서 전송된 모든 이미지를 조회합니다. (SRS 7.2.6 참조)
        
        **특징:**
        - 모아보내기 메시지의 이미지도 개별 항목으로 펼침
        - 최신 이미지부터 내림차순 정렬
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 이미지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/unread-count:
    get:
      tags: [Chat Rooms]
      summary: 전체 안읽은 메시지 수 조회
      description: |
        사용자의 모든 채팅방에서 안읽은 메시지 총 개수를 조회합니다.
        
        **사용 시점:**
        - 앱 실행 시 뱃지 카운트 표시
        - 소켓 재연결 후 동기화
        
        **반환 값:**
        - 전체 안읽은 메시지 수
        - 채팅방별 안읽은 메시지 수 (선택)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ================================
  # 메시지 API
  # ================================
  /rooms/{roomId}/messages:
    get:
      tags: [Messages]
      summary: 메시지 목록 조회
      description: |
        채팅방의 메시지 목록을 조회합니다. (SRS 7.3 참조)
        
        **페이지네이션:**
        - 커서 기반 (messageId 사용)
        - 최신 메시지부터 내림차순
        
        **메시지 타입:**
        - TEXT: 텍스트 메시지
        - IMAGE: 이미지 메시지 (배열)
        - SYSTEM: 시스템 메시지
        - CHALLENGE_CHECKIN: 챌린지 체크인 (향후)
        - FEED: 클럽 피드 (향후)
        - POLL: 클럽 투표 (향후)
        
        **참고:** 메시지 전송은 Socket.IO `send_message` 이벤트 사용
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 메시지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ================================
  # 공지사항 API
  # ================================
  /rooms/{roomId}/announcements:
    get:
      tags: [Announcements]
      summary: 공지 목록 조회
      description: |
        채팅방의 공지사항 목록을 조회합니다. (SRS 7.2.7 참조)
        
        **정렬:** 최신 공지부터 내림차순
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/CursorAfter'
        - $ref: '#/components/parameters/CursorBefore'
        - $ref: '#/components/parameters/Count'
      responses:
        '200':
          description: 공지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rooms/{roomId}/messages/{messageId}/announcement:
    post:
      tags: [Announcements]
      summary: 공지 설정
      description: |
        메시지를 공지로 설정합니다. (SRS 7.3.5 참조)
        
        **권한:** HOST, MANAGER만 가능
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: 공지 설정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Announcements]
      summary: 공지 해제
      description: |
        메시지의 공지 설정을 해제합니다. (SRS 7.3.5 참조)
        
        **권한:** HOST, MANAGER만 가능
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: 공지 해제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
