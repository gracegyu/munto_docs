  /upload/presigned-url:
    post:
      tags: [Upload]
      summary: 이미지 업로드 Presigned URL 발급
      description: |
        S3 이미지 업로드를 위한 Presigned URL을 발급합니다. (SRS 7.3.2 참조)
        
        **업로드 제한:**
        - 이미지당 최대 10MB
        - 한 번에 최대 10개 URL 발급 가능
        - 지원 형식: JPEG, PNG, GIF, WebP
        
        **업로드 흐름:**
        1. 이 API로 Presigned URL 발급
        2. 클라이언트에서 S3에 직접 업로드
        3. 업로드 완료 후 Socket.IO로 메시지 전송
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlRequest'
      responses:
        '200':
          description: Presigned URL 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

